name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install ruff pytest
      - name: Lint (ruff)
        # Non-blocking for now; tighten to a hard gate once the codebase is clean.
        run: ruff check . || true
      - name: Tests (pytest)
        run: pytest tests -q

  frontend:
    name: Frontend (lint + types + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build-time placeholders; real secrets live in deployment env, not CI.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      JWT_SECRET: "ci-placeholder"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
